<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的日程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fafaf8;--surface:#ffffff;--surface2:#f3f2ef;
    --border:#e5e4e0;--border2:#d0cfc9;
    --text:#1a1916;--text2:#6b6a65;--text3:#9b9a96;
    --accent:#2563eb;--accent-bg:#eff4ff;
    --green:#16a34a;--green-bg:#f0fdf4;--green-border:#bbf7d0;
    --orange:#c2410c;--orange-bg:#fff7ed;--orange-border:#fed7aa;
    --radius:12px;--radius-sm:8px;
    --shadow-modal:0 8px 32px rgba(0,0,0,0.12),0 2px 8px rgba(0,0,0,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

  /* Header */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .logo{font-size:15px;font-weight:600;letter-spacing:-.3px;}
  .logo span{color:var(--accent);}
  .header-right{display:flex;gap:8px;align-items:center;}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,transform .1s;font-family:inherit;border:1px solid var(--border2);background:var(--surface);color:var(--text);line-height:1;}
  .btn:hover{background:var(--surface2);}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn-primary:hover{background:#1d4ed8;}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--text2);}
  .btn-ghost:hover{background:var(--surface2);color:var(--text);}
  .btn-green{background:var(--green);color:#fff;border-color:var(--green);}
  .btn-green:hover{background:#15803d;}

  /* Main */
  .main{padding:1.5rem 2rem 3rem;max-width:1200px;margin:0 auto;}
  .week-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:12px;flex-wrap:wrap;}
  .week-nav{display:flex;align-items:center;gap:6px;}
  .week-label{font-size:16px;font-weight:600;min-width:200px;text-align:center;letter-spacing:-.3px;}

  /* Calendar */
  .calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;}
  .day-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-height:140px;cursor:pointer;transition:border-color .15s;}
  .day-col:hover{border-color:var(--border2);}
  .day-col.today-col{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .day-head{padding:10px 8px 8px;text-align:center;border-bottom:1px solid var(--border);}
  .day-name{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.5px;margin-bottom:4px;}
  .day-num{font-size:20px;font-weight:600;color:var(--text);line-height:1;}
  .day-num.today{width:32px;height:32px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:16px;}
  .events-body{padding:6px;display:flex;flex-direction:column;gap:4px;}
  .event-chip{border-radius:6px;padding:5px 8px;font-size:11px;line-height:1.4;position:relative;cursor:default;}
  .event-chip:hover .chip-del{opacity:1;}
  .chip-title{font-weight:500;margin-bottom:1px;word-break:break-all;}
  .chip-time{opacity:.75;font-size:10px;}
  .chip-del{opacity:0;position:absolute;top:4px;right:5px;background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:0;color:inherit;transition:opacity .15s;}
  .add-hint{text-align:center;font-size:11px;color:var(--text3);padding:8px 4px;}

  /* Reminder status bar */
  .reminder-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:var(--radius-sm);margin-bottom:1.25rem;font-size:13px;border:1px solid;}
  .reminder-bar.on{background:var(--green-bg);border-color:var(--green-border);color:var(--green);}
  .reminder-bar.off{background:var(--orange-bg);border-color:var(--orange-border);color:var(--orange);}
  .reminder-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .reminder-bar.on .reminder-dot{background:var(--green);animation:pulse 2s infinite;}
  .reminder-bar.off .reminder-dot{background:var(--orange);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  /* Overlay / Modal */
  .overlay{display:none;position:fixed;inset:0;background:rgba(10,10,8,.4);z-index:200;align-items:center;justify-content:center;padding:1rem;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-modal);padding:1.75rem;width:100%;max-width:440px;animation:fadeUp .2s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .modal-title{font-size:17px;font-weight:600;letter-spacing:-.3px;margin-bottom:1.25rem;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;}
  .field input,.field textarea{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 11px;font-size:14px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s;}
  .field input:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  .field textarea{resize:vertical;min-height:64px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .color-row{display:flex;gap:8px;flex-wrap:wrap;}
  .color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;flex-shrink:0;}
  .color-dot:hover,.color-dot.active{transform:scale(1.15);}
  .modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);}

  /* Settings Modal extras */
  .setting-section{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:14px;}
  .setting-section-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
  .steps{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .steps li{display:flex;gap:8px;font-size:13px;color:var(--text2);align-items:flex-start;}
  .step-num{width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .steps a{color:var(--accent);}
  .advance-row{display:flex;gap:8px;align-items:center;}
  .advance-row select{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;}
  .test-btn-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
  .status-chip{font-size:12px;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;}
  .status-chip.ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
  .status-chip.err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}

  /* AI Panel */
  .ai-fab{position:fixed;bottom:2rem;right:2rem;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.35);z-index:100;transition:transform .2s,box-shadow .2s;font-family:inherit;}
  .ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(37,99,235,.45);}
  .ai-fab.open{background:#475569;box-shadow:0 4px 16px rgba(0,0,0,.2);}

  .ai-panel{position:fixed;bottom:5.5rem;right:2rem;width:360px;max-height:540px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-modal);display:flex;flex-direction:column;z-index:99;transform:scale(.95) translateY(8px);opacity:0;pointer-events:none;transition:transform .2s ease,opacity .2s ease;transform-origin:bottom right;}
  .ai-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
  .ai-panel-head{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .ai-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ai-head-info{flex:1;}
  .ai-head-info strong{font-size:13px;font-weight:600;display:block;}
  .ai-head-info span{font-size:11px;color:var(--text3);}
  .ai-quick-btns{padding:10px 12px 8px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;}
  .quick-btn{font-size:11px;padding:5px 10px;border:1px solid var(--border2);border-radius:20px;background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;transition:background .12s,color .12s;white-space:nowrap;}
  .quick-btn:hover{background:var(--accent-bg);color:var(--accent);border-color:#bfdbfe;}
  .ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0;}
  .msg{display:flex;gap:8px;align-items:flex-start;}
  .msg.user{flex-direction:row-reverse;}
  .msg-bubble{max-width:82%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .msg.ai .msg-bubble{background:var(--surface2);color:var(--text);border-radius:4px 12px 12px 12px;}
  .msg.user .msg-bubble{background:var(--accent);color:#fff;border-radius:12px 4px 12px 12px;}
  .msg-av{width:24px;height:24px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .msg-av.u{background:var(--surface2);}
  .typing{display:flex;gap:4px;padding:4px 2px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
  #aiInput{flex:1;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;font-family:inherit;resize:none;outline:none;color:var(--text);background:var(--surface);max-height:80px;line-height:1.5;transition:border-color .15s;}
  #aiInput:focus{border-color:var(--accent);}
  .ai-send{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
  .ai-send:hover{background:#1d4ed8;}
  .ai-send:disabled{background:var(--border2);cursor:default;}
  .api-banner{background:#fef9c3;border:1px solid #fde68a;border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:#854d0e;margin:8px 12px;line-height:1.5;flex-shrink:0;}
  .api-banner a{color:var(--accent);text-decoration:underline;cursor:pointer;}
  .key-row{display:flex;gap:6px;margin-top:6px;}
  .key-row input{flex:1;border:1px solid #fde68a;border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:#fff;outline:none;color:var(--text);}
  .key-row button{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-family:inherit;white-space:nowrap;}

  @media(max-width:720px){
    header{padding:0 1rem;}
    .main{padding:1rem 1rem 2rem;}
    .calendar{gap:4px;}
    .day-num{font-size:15px;}
    .week-label{font-size:14px;min-width:160px;}
    .ai-panel{width:calc(100vw - 2rem);right:1rem;}
    .ai-fab{bottom:1.5rem;right:1rem;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">我的<span>日程</span></div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="openSettings()" title="微信提醒设置">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93a10 10 0 0 0 14.14 14.14"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      微信提醒
    </button>
    <button class="btn btn-ghost" onclick="goToday()">今天</button>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      添加日程
    </button>
  </div>
</header>

<div class="main">
  <div id="reminderBar"></div>
  <div class="week-bar">
    <div class="week-nav">
      <button class="btn" onclick="shiftWeek(-1)">← 上周</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="btn" onclick="shiftWeek(1)">下周 →</button>
    </div>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<!-- Add Event Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">添加日程</div>
    <div class="field"><label>标题 *</label><input type="text" id="f-title" placeholder="例如：团队会议" autocomplete="off"/></div>
    <div class="field"><label>日期 *</label><input type="date" id="f-date"/></div>
    <div class="field-row">
      <div class="field" style="margin-bottom:0"><label>开始时间</label><input type="time" id="f-start" value="09:00"/></div>
      <div class="field" style="margin-bottom:0"><label>结束时间</label><input type="time" id="f-end" value="10:00"/></div>
    </div>
    <div class="field" style="margin-top:14px"><label>备注</label><textarea id="f-note" placeholder="可选，添加备注信息…"></textarea></div>
    <div class="field"><label>标签颜色</label><div class="color-row" id="colorRow"></div></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEvent()">保存日程</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="overlay" id="settingsOverlay">
  <div class="modal" style="max-width:480px;">
    <div class="modal-title">🔔 微信提醒设置</div>

    <div class="setting-section">
      <div class="setting-section-title">第一步：获取 SendKey</div>
      <ol class="steps">
        <li><div class="step-num">1</div><span>打开 <a href="https://sct.ftqq.com" target="_blank">sct.ftqq.com</a>，用微信扫码登录</span></li>
        <li><div class="step-num">2</div><span>关注页面提示的「方糖」公众号（消息从这里推送）</span></li>
        <li><div class="step-num">3</div><span>复制你的 <strong>SendKey</strong>（格式：SCT…）</span></li>
      </ol>
      <div class="field" style="margin-bottom:0">
        <label>SendKey</label>
        <input type="text" id="sendKeyInput" placeholder="SCT123456Tabcdefg..." autocomplete="off"/>
      </div>
    </div>

    <div class="setting-section">
      <div class="setting-section-title">第二步：提前提醒时间</div>
      <div class="advance-row">
        <span style="font-size:13px;color:var(--text2)">在日程开始前</span>
        <select id="advanceSelect">
          <option value="5">5 分钟</option>
          <option value="10">10 分钟</option>
          <option value="15" selected>15 分钟</option>
          <option value="30">30 分钟</option>
          <option value="60">1 小时</option>
        </select>
        <span style="font-size:13px;color:var(--text2)">发送微信提醒</span>
      </div>
      <div class="test-btn-row">
        <button class="btn btn-green" onclick="sendTestMsg()" id="testBtn">发送测试消息</button>
        <span id="testStatus"></span>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
    </div>
  </div>
</div>

<!-- AI Panel -->
<div class="ai-panel" id="aiPanel">
  <div class="ai-panel-head">
    <div class="ai-avatar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
    <div class="ai-head-info"><strong>AI 日程助手</strong><span>分析日程 · 发现冲突 · 提供建议</span></div>
    <button class="btn btn-ghost" style="padding:4px 8px;font-size:18px;line-height:1;border-radius:6px" onclick="toggleAI()">×</button>
  </div>
  <div id="apiBanner"></div>
  <div class="ai-quick-btns">
    <button class="quick-btn" onclick="quickAsk('分析本周的日程安排，有哪些需要注意的？')">📋 本周概览</button>
    <button class="quick-btn" onclick="quickAsk('检查我的日程是否有时间冲突')">⚠️ 检查冲突</button>
    <button class="quick-btn" onclick="quickAsk('今天有哪些日程安排？')">📅 今日日程</button>
    <button class="quick-btn" onclick="quickAsk('帮我规划一下明天的时间安排，哪些时段可以安排新任务？')">✨ 空闲时间</button>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="msg ai">
      <div class="msg-av"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
      <div class="msg-bubble">你好！我是你的 AI 日程助手 👋

我可以帮你：
• 分析日程安排，找出时间冲突
• 提醒今日或即将到来的重要事项
• 给出时间管理建议
• 回答任何关于日程的问题

有什么可以帮到你的？</div>
    </div>
  </div>
  <div class="ai-input-row">
    <textarea id="aiInput" placeholder="问问 AI 助手…" rows="1" onkeydown="handleAIKey(event)" oninput="autoResize(this)"></textarea>
    <button class="ai-send" id="aiSendBtn" onclick="sendAI()" title="发送">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
    </button>
  </div>
</div>

<button class="ai-fab" id="aiFab" onclick="toggleAI()" title="AI 日程助手">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
</button>

<script>
/* ── Constants ── */
const COLORS=[{bg:'#dbeafe',text:'#1e40af'},{bg:'#dcfce7',text:'#166534'},{bg:'#fef9c3',text:'#854d0e'},{bg:'#fee2e2',text:'#991b1b'},{bg:'#ede9fe',text:'#5b21b6'},{bg:'#fce7f3',text:'#9d174d'},{bg:'#e5e7eb',text:'#374151'}];
const DAYS=['一','二','三','四','五','六','日'];

/* ── State ── */
let events=[],weekOffset=0,selColor=0;
let aiOpen=false,aiLoading=false,chatHistory=[];
let reminderTimer=null;
const notifiedSet=new Set(); // "eventId-YYYY-MM-DD-HH:MM" keys already notified

/* ── Persistence ── */
function loadEvents(){try{const r=localStorage.getItem('myScheduleEvents');if(r)events=JSON.parse(r);}catch(e){events=[];}}
function saveEvents(){localStorage.setItem('myScheduleEvents',JSON.stringify(events));}
function getAPIKey(){return localStorage.getItem('scheduleAPIKey')||'';}
function setAPIKey(k){localStorage.setItem('scheduleAPIKey',k.trim());}
function getSendKey(){return localStorage.getItem('scheduleSendKey')||'';}
function getAdvance(){return parseInt(localStorage.getItem('scheduleAdvance')||'15',10);}

/* ── Calendar helpers ── */
function toDateStr(d){return d.toISOString().slice(0,10);}
function getWeekStart(off){const n=new Date(),dow=n.getDay(),diff=dow===0?-6:1-dow,m=new Date(n);m.setDate(n.getDate()+diff+off*7);m.setHours(0,0,0,0);return m;}
function fmtRange(ws,we){const y=ws.getFullYear(),sm=ws.getMonth()+1,sd=ws.getDate(),em=we.getMonth()+1,ed=we.getDate();return sm===em?`${y}年${sm}月${sd}日 – ${ed}日`:`${y}年${sm}月${sd}日 – ${em}月${ed}日`;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Render calendar ── */
function render(){
  const ws=getWeekStart(weekOffset),we=new Date(ws);we.setDate(ws.getDate()+6);
  document.getElementById('weekLabel').textContent=fmtRange(ws,we);
  const today=toDateStr(new Date()),cal=document.getElementById('calendar');
  cal.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const ds=toDateStr(d),isToday=ds===today;
    const dayEvs=events.filter(e=>e.date===ds).sort((a,b)=>a.start.localeCompare(b.start));
    const col=document.createElement('div');
    col.className='day-col'+(isToday?' today-col':'');
    col.onclick=e=>{if(e.target===col||e.target.closest('.day-head'))openModal(ds);};
    const numHtml=isToday?`<div class="day-num today">${d.getDate()}</div>`:`<div class="day-num">${d.getDate()}</div>`;
    let chips=dayEvs.map(ev=>{const c=COLORS[ev.color]||COLORS[0];return`<div class="event-chip" style="background:${c.bg};color:${c.text}"><button class="chip-del" onclick="event.stopPropagation();delEvent('${ev.id}')">×</button><div class="chip-title">${esc(ev.title)}</div><div class="chip-time">${ev.start}${ev.end?' – '+ev.end:''}</div></div>`;}).join('');
    if(!chips)chips=`<div class="add-hint">点击添加</div>`;
    col.innerHTML=`<div class="day-head"><div class="day-name">周${DAYS[i]}</div>${numHtml}</div><div class="events-body">${chips}</div>`;
    cal.appendChild(col);
  }
  renderReminderBar();
}

function shiftWeek(d){weekOffset+=d;render();}
function goToday(){weekOffset=0;render();}

/* ── Add Event Modal ── */
function openModal(ds){selColor=0;document.getElementById('f-title').value='';document.getElementById('f-date').value=ds||toDateStr(new Date());document.getElementById('f-start').value='09:00';document.getElementById('f-end').value='10:00';document.getElementById('f-note').value='';renderColorDots();document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('f-title').focus(),100);}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function renderColorDots(){document.getElementById('colorRow').innerHTML=COLORS.map((c,i)=>`<div class="color-dot${i===selColor?' active':''}" style="background:${c.bg};outline:${i===selColor?'2px solid '+c.text:'none'}" onclick="pickColor(${i})"></div>`).join('');}
function pickColor(i){selColor=i;renderColorDots();}
function saveEvent(){
  const title=document.getElementById('f-title').value.trim(),date=document.getElementById('f-date').value;
  if(!title){document.getElementById('f-title').style.borderColor='#ef4444';setTimeout(()=>document.getElementById('f-title').style.borderColor='',1500);return;}
  if(!date)return;
  events.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),title,date,start:document.getElementById('f-start').value,end:document.getElementById('f-end').value,note:document.getElementById('f-note').value.trim(),color:selColor});
  saveEvents();closeModal();render();
}
function delEvent(id){if(!confirm('确认删除此日程？'))return;events=events.filter(e=>e.id!==id);saveEvents();render();}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeSettings();}
  if(e.key==='Enter'&&document.getElementById('overlay').classList.contains('open')){if(e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='BUTTON')saveEvent();}
});

function renderReminderBar(){
  const bar=document.getElementById('reminderBar');
  const key=getSendKey();
  if(key){
    bar.innerHTML=`<div class="reminder-bar on"><div class="reminder-dot"></div><span>微信提醒已开启 — 提前 ${getAdvance()} 分钟推送</span><button class="btn btn-ghost" style="padding:3px 10px;font-size:12px;margin-left:auto" onclick="openSettings()">修改</button></div>`;
  } else {
    bar.innerHTML=`<div class="reminder-bar off"><div class="reminder-dot"></div><span>微信提醒未设置</span><button class="btn btn-ghost" style="padding:3px 10px;font-size:12px;margin-left:auto" onclick="openSettings()">立即开启 →</button></div>`;
  }
}

function openSettings(){
  document.getElementById('sendKeyInput').value=getSendKey();
  document.getElementById('advanceSelect').value=String(getAdvance());
  document.getElementById('testStatus').innerHTML='';
  document.getElementById('settingsOverlay').classList.add('open');
}
function closeSettings(){document.getElementById('settingsOverlay').classList.remove('open');}
function saveSettings(){
  const key=document.getElementById('sendKeyInput').value.trim();
  const adv=document.getElementById('advanceSelect').value;
  if(key&&!key.startsWith('SCT')){alert('SendKey 格式不对，应以 SCT 开头');return;}
  localStorage.setItem('scheduleSendKey',key);
  localStorage.setItem('scheduleAdvance',adv);
  closeSettings();
  render();
  startReminderLoop();
}

/* Call Server酱 API via JSONP to avoid CORS */
async function callServerChan(sendKey, title, desp){
  return new Promise((resolve,reject)=>{
    const cbName='_sc_'+Date.now();
    const script=document.createElement('script');
    const params=new URLSearchParams({title,desp,channel:'9'});
    script.src=`https://sctapi.ftqq.com/${sendKey}.send?${params}&callback=${cbName}`;
    script.onerror=()=>reject(new Error('网络错误'));
    window[cbName]=(data)=>{
      delete window[cbName];script.remove();
      if(data&&data.data&&data.data.errno===0)resolve(data);
      else reject(new Error(data?.message||'发送失败'));
    };
    setTimeout(()=>{delete window[cbName];script.remove();reject(new Error('请求超时'));},8000);
    document.head.appendChild(script);
  });
}

async function sendTestMsg(){
  const key=document.getElementById('sendKeyInput').value.trim();
  if(!key){alert('请先填写 SendKey');return;}
  if(!key.startsWith('SCT')){alert('SendKey 格式不对，应以 SCT 开头');return;}
  const btn=document.getElementById('testBtn');
  const status=document.getElementById('testStatus');
  btn.disabled=true;btn.textContent='发送中…';
  try{
    await callServerChan(key,'📅 日程提醒测试','这是来自「我的日程」的测试消息，微信提醒配置成功！');
    status.innerHTML='<span class="status-chip ok">✓ 发送成功，请查看微信</span>';
  }catch(e){
    status.innerHTML=`<span class="status-chip err">✗ ${e.message}</span>`;
  }finally{btn.disabled=false;btn.textContent='发送测试消息';}
}

/* Reminder loop — runs every 60s */
function startReminderLoop(){
  if(reminderTimer)clearInterval(reminderTimer);
  checkReminders();
  reminderTimer=setInterval(checkReminders,60000);
}

async function checkReminders(){
  const key=getSendKey();if(!key)return;
  const advance=getAdvance();
  const now=new Date();
  const todayStr=toDateStr(now);

  for(const ev of events){
    if(ev.date<todayStr)continue;
    const eventDt=new Date(`${ev.date}T${ev.start}`);
    const diffMin=(eventDt-now)/60000;
    if(diffMin>=0&&diffMin<=advance){
      const notifyKey=`${ev.id}-${ev.date}-${ev.start}`;
      if(notifiedSet.has(notifyKey))continue;
      notifiedSet.add(notifyKey);
      const minsLeft=Math.round(diffMin);
      const title=`📅 即将开始：${ev.title}`;
      const desp=`**时间**：${ev.date} ${ev.start}${ev.end?' – '+ev.end:''}\n**距开始**：${minsLeft===0?'现在开始':`还有 ${minsLeft} 分钟`}${ev.note?'\n**备注**：'+ev.note:''}`;
      callServerChan(key,title,desp).catch(()=>{});
    }
  }
}

function toggleAI(){
  aiOpen=!aiOpen;
  document.getElementById('aiPanel').classList.toggle('open',aiOpen);
  document.getElementById('aiFab').classList.toggle('open',aiOpen);
  if(aiOpen){renderAPIBanner();setTimeout(()=>document.getElementById('aiInput').focus(),250);}
}
function renderAPIBanner(){
  const b=document.getElementById('apiBanner');
  if(getAPIKey()){b.innerHTML='';return;}
  b.innerHTML=`<div class="api-banner">需要 <strong>Anthropic API Key</strong> 才能使用 AI 功能。<a href="https://console.anthropic.com" target="_blank">点此获取</a><div class="key-row"><input type="password" id="keyInput" placeholder="sk-ant-..."/><button onclick="saveAIKey()">保存</button></div></div>`;
}
function saveAIKey(){const v=(document.getElementById('keyInput').value||'').trim();if(!v.startsWith('sk-')){alert('请输入有效的 API Key（以 sk- 开头）');return;}setAPIKey(v);renderAPIBanner();addMsg('ai','API Key 已保存！现在可以开始使用 AI 功能了 🎉 有什么可以帮到你？');}
function getScheduleCtx(){const today=toDateStr(new Date());const list=events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start)).slice(0,50);if(!list.length)return'（暂无日程）';return list.map(e=>`- ${e.date} ${e.start}${e.end?'–'+e.end:''} ${e.title}${e.note?' ['+e.note+']':''}`).join('\n');}
function sysPrompt(){return`你是用户的私人日程助手，说话简洁友好，擅长中文。今天是 ${toDateStr(new Date())}（${['日','一','二','三','四','五','六'][new Date().getDay()]}）。\n\n用户日程列表（今天起）：\n${getScheduleCtx()}\n\n你的职责：分析安排、找时间冲突、给出优先级建议、回答日程问题、提醒重要事项、帮助规划时间。回复简洁，适当用 emoji，中文回答。`;}
const AI_AV=`<div class="msg-av"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>`;
const USER_AV=`<div class="msg-av u"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6b6a65" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;
function addMsg(role,text){const box=document.getElementById('aiMessages');const d=document.createElement('div');d.className='msg '+role;d.innerHTML=(role==='ai'?AI_AV:USER_AV)+`<div class="msg-bubble">${esc(text)}</div>`;box.appendChild(d);box.scrollTop=box.scrollHeight;}
function addTyping(){const box=document.getElementById('aiMessages');const d=document.createElement('div');d.className='msg ai';d.id='typingMsg';d.innerHTML=AI_AV+`<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;box.appendChild(d);box.scrollTop=box.scrollHeight;}
function removeTyping(){const t=document.getElementById('typingMsg');if(t)t.remove();}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}
function handleAIKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}}
async function quickAsk(q){if(!aiOpen)toggleAI();await new Promise(r=>setTimeout(r,150));document.getElementById('aiInput').value=q;await sendAI();}
async function sendAI(){
  if(aiLoading)return;
  const inp=document.getElementById('aiInput');const text=inp.value.trim();if(!text)return;
  const key=getAPIKey();if(!key){addMsg('ai','请先输入 Anthropic API Key 才能使用 AI 功能。');renderAPIBanner();return;}
  inp.value='';inp.style.height='auto';addMsg('user',text);chatHistory.push({role:'user',content:text});
  aiLoading=true;document.getElementById('aiSendBtn').disabled=true;addTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sysPrompt(),messages:chatHistory})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+res.status);}
    const data=await res.json();const reply=data.content.find(b=>b.type==='text')?.text||'（无回复）';
    chatHistory.push({role:'assistant',content:reply});if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);
    removeTyping();addMsg('ai',reply);
  }catch(e){
    removeTyping();const m=e.message.includes('401')?'API Key 无效，请重新输入。':e.message.includes('429')?'请求太频繁，请稍后再试。':'连接失败：'+e.message;
    addMsg('ai','⚠️ '+m);if(e.message.includes('401')){localStorage.removeItem('scheduleAPIKey');renderAPIBanner();}
  }finally{aiLoading=false;document.getElementById('aiSendBtn').disabled=false;document.getElementById('aiInput').focus();}
}

loadEvents();

startReminderLoop();
