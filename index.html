<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的日程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --surface2: #f3f2ef;
    --border: #e5e4e0;
    --border2: #d0cfc9;
    --text: #1a1916;
    --text2: #6b6a65;
    --text3: #9b9a96;
    --accent: #2563eb;
    --accent-bg: #eff4ff;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-modal: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    line-height: 1;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  /* ── Main layout ── */
  .main { padding: 1.5rem 2rem 3rem; max-width: 1200px; margin: 0 auto; }

  /* ── Week nav bar ── */
  .week-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 12px;
    flex-wrap: wrap;
  }
  .week-nav { display: flex; align-items: center; gap: 6px; }
  .week-label {
    font-size: 16px; font-weight: 600;
    min-width: 200px; text-align: center;
    letter-spacing: -0.3px;
  }

  /* ── Calendar grid ── */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 8px;
  }
  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 140px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .day-col:hover { border-color: var(--border2); }
  .day-col.today-col {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .day-head {
    padding: 10px 8px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .day-name {
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .day-num {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .day-num.today {
    width: 32px; height: 32px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    font-size: 16px;
  }
  .events-body { padding: 6px; display: flex; flex-direction: column; gap: 4px; }
  .event-chip {
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 11px;
    line-height: 1.4;
    position: relative;
    cursor: default;
  }
  .event-chip:hover .chip-del { opacity: 1; }
  .chip-title { font-weight: 500; margin-bottom: 1px; word-break: break-all; }
  .chip-time { opacity: 0.75; font-size: 10px; }
  .chip-del {
    opacity: 0;
    position: absolute;
    top: 4px; right: 5px;
    background: none; border: none; cursor: pointer;
    font-size: 14px; line-height: 1;
    padding: 0; color: inherit;
    transition: opacity 0.15s;
  }
  .add-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 8px 4px;
  }

  /* ── Modal ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(10,10,8,0.4);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow-modal);
    padding: 1.75rem;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .modal-title {
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 1.25rem;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--text2);
    margin-bottom: 5px;
    letter-spacing: 0.2px;
  }
  .field input,
  .field textarea,
  .field select {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 11px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .field textarea { resize: vertical; min-height: 64px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .color-dot {
    width: 24px; height: 24px; border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: var(--text); transform: scale(1.15); }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }

  /* ── Empty state ── */
  .empty-week {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem;
    color: var(--text3);
    font-size: 14px;
    display: none;
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    header { padding: 0 1rem; }
    .main { padding: 1rem 1rem 2rem; }
    .calendar { grid-template-columns: repeat(7, minmax(0,1fr)); gap: 4px; }
    .day-num { font-size: 15px; }
    .week-label { font-size: 14px; min-width: 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">我的<span>日程</span></div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="goToday()">今天</button>
    <button class="btn btn-primary" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      添加日程
    </button>
  </div>
</header>

<div class="main">
  <div class="week-bar">
    <div class="week-nav">
      <button class="btn" onclick="shiftWeek(-1)">&#8592; 上周</button>
      <span class="week-label" id="weekLabel"></span>
      <button class="btn" onclick="shiftWeek(1)">下周 &#8594;</button>
    </div>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle">添加日程</div>

    <div class="field">
      <label>标题 *</label>
      <input type="text" id="f-title" placeholder="例如：团队会议" autocomplete="off" />
    </div>
    <div class="field">
      <label>日期 *</label>
      <input type="date" id="f-date" />
    </div>
    <div class="field-row">
      <div class="field" style="margin-bottom:0">
        <label>开始时间</label>
        <input type="time" id="f-start" value="09:00" />
      </div>
      <div class="field" style="margin-bottom:0">
        <label>结束时间</label>
        <input type="time" id="f-end" value="10:00" />
      </div>
    </div>
    <div class="field" style="margin-top:14px">
      <label>备注</label>
      <textarea id="f-note" placeholder="可选，添加备注信息…"></textarea>
    </div>
    <div class="field">
      <label>标签颜色</label>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEvent()" id="saveBtn">保存日程</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { bg: '#dbeafe', text: '#1e40af' },
  { bg: '#dcfce7', text: '#166534' },
  { bg: '#fef9c3', text: '#854d0e' },
  { bg: '#fee2e2', text: '#991b1b' },
  { bg: '#ede9fe', text: '#5b21b6' },
  { bg: '#fce7f3', text: '#9d174d' },
  { bg: '#e5e7eb', text: '#374151' },
];

const DAYS = ['一','二','三','四','五','六','日'];
let events = [];
let weekOffset = 0;
let selColor = 0;
let editId = null;

function loadEvents() {
  try {
    const raw = localStorage.getItem('myScheduleEvents');
    if (raw) events = JSON.parse(raw);
  } catch(e) { events = []; }
}

function saveEvents() {
  localStorage.setItem('myScheduleEvents', JSON.stringify(events));
}

function toDateStr(d) {
  return d.toISOString().slice(0, 10);
}

function getWeekStart(offset) {
  const now = new Date();
  const dow = now.getDay();
  const diff = (dow === 0 ? -6 : 1 - dow);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function fmtRange(ws, we) {
  const y = ws.getFullYear();
  const sm = ws.getMonth()+1, sd = ws.getDate();
  const em = we.getMonth()+1, ed = we.getDate();
  if (sm === em) return `${y}年${sm}月${sd}日 – ${ed}日`;
  return `${y}年${sm}月${sd}日 – ${em}月${ed}日`;
}

function render() {
  const ws = getWeekStart(weekOffset);
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('weekLabel').textContent = fmtRange(ws, we);

  const today = toDateStr(new Date());
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const ds = toDateStr(d);
    const isToday = ds === today;
    const dayEvs = events.filter(e => e.date === ds)
      .sort((a, b) => a.start.localeCompare(b.start));

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today-col' : '');
    col.onclick = (e) => { if (e.target === col || e.target.closest('.day-head')) openModal(ds); };

    const numHtml = isToday
      ? `<div class="day-num today">${d.getDate()}</div>`
      : `<div class="day-num">${d.getDate()}</div>`;

    let chipsHtml = dayEvs.map(ev => {
      const c = COLORS[ev.color] || COLORS[0];
      return `<div class="event-chip" style="background:${c.bg};color:${c.text}" title="${ev.note||''}">
        <button class="chip-del" onclick="event.stopPropagation();delEvent('${ev.id}')" title="删除">×</button>
        <div class="chip-title">${esc(ev.title)}</div>
        <div class="chip-time">${ev.start}${ev.end ? ' – ' + ev.end : ''}</div>
      </div>`;
    }).join('');

    if (!chipsHtml) chipsHtml = `<div class="add-hint">点击添加</div>`;

    col.innerHTML = `
      <div class="day-head">
        <div class="day-name">周${DAYS[i]}</div>
        ${numHtml}
      </div>
      <div class="events-body">${chipsHtml}</div>`;

    cal.appendChild(col);
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shiftWeek(d) { weekOffset += d; render(); }
function goToday() { weekOffset = 0; render(); }

function openModal(dateStr) {
  editId = null;
  selColor = 0;
  document.getElementById('f-title').value = '';
  document.getElementById('f-date').value = dateStr || toDateStr(new Date());
  document.getElementById('f-start').value = '09:00';
  document.getElementById('f-end').value = '10:00';
  document.getElementById('f-note').value = '';
  document.getElementById('modalTitle').textContent = '添加日程';
  document.getElementById('saveBtn').textContent = '保存日程';
  renderColorDots();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

function renderColorDots() {
  const row = document.getElementById('colorRow');
  row.innerHTML = COLORS.map((c, i) =>
    `<div class="color-dot${i===selColor?' active':''}" style="background:${c.bg};outline:${i===selColor?'2px solid '+c.text:'none'}" onclick="pickColor(${i})"></div>`
  ).join('');
}

function pickColor(i) { selColor = i; renderColorDots(); }

function saveEvent() {
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  if (!title) {
    document.getElementById('f-title').focus();
    document.getElementById('f-title').style.borderColor = '#ef4444';
    setTimeout(() => document.getElementById('f-title').style.borderColor = '', 1500);
    return;
  }
  if (!date) {
    document.getElementById('f-date').focus();
    return;
  }

  const ev = {
    id: editId || Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    title,
    date,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    note: document.getElementById('f-note').value.trim(),
    color: selColor,
  };

  if (editId) {
    events = events.map(e => e.id === editId ? ev : e);
  } else {
    events.push(ev);
  }

  saveEvents();
  closeModal();
  render();
}

function delEvent(id) {
  if (!confirm('确认删除此日程？')) return;
  events = events.filter(e => e.id !== id);
  saveEvents();
  render();
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('open')) {
    const t = e.target.tagName;
    if (t !== 'TEXTAREA' && t !== 'BUTTON') saveEvent();
  }
});

loadEvents();
render();
</script>
</body>
</html>
